services:
  postgres:
    image: postgres:16-alpine
    container_name: videre-db
    environment:
      POSTGRES_USER: videre
      POSTGRES_PASSWORD: videre
      POSTGRES_DB: videre_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videre -d videre_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
